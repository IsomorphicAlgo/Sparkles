# RKLB baseline experiment — Phase 1
# Symbol and practice ticker
symbol: RKLB
exchange_timezone: America/New_York

cache_ttl_hours: 24

# TwelveData FREE tier (~8 API credits / minute): throttle + fewer chunks.
# If you still see credit errors, increase ingest_sleep_seconds_between_chunks (e.g. 30–45)
# or shorten data_start/data_end. Paid tiers can lower these.
ingest_chunk_calendar_days: 10
ingest_sleep_seconds_between_chunks: 10
twelvedata_per_minute_credit_wait_seconds: 65

# Historical 1m range for ingest (inclusive-ish per API chunks in Iteration 2)
data_start: 2022-01-01
data_end: 2026-03-30

# Optional train/val windows (defaults omitted = set when you start training)
train_start: 2022-01-01
train_end: 2026-01-01
val_start: 2026-01-02
val_end: 2026-03-30

# Triple barrier (fractions: 0.15 = 15%)
profit_barrier_base: 0.15
stop_loss_base: 0.1 #0.05
# Floor on take-profit *move* after vol scaling (0.02 = 2%)
min_profit_per_trade_pct: 0.1

vol_lookback_trading_days: 20
vertical_max_trading_days: 10
vol_ref_method: median

# Candidate entry bars: indices 0, N, 2N, ... (1m rows). Filename includes _s{N}.
# 390 ≈ one entry per regular US RTH session (~6.5h of consecutive minutes); use 1 for
# every minute (many more label rows, slower `sparkles label`, highly correlated samples).
label_entry_stride: 390 #390

# Day-trade budget (conservative vs PDT)
max_day_trades: 3
rolling_business_days: 5

model:
  type: logistic_regression
  # type: xgboost_classifier   # requires: pip install -e ".[ml]"
  random_seed: 42
  # solver: lbfgs
  tol: 0.0001 # 0.0001
  class_weight: balanced

# train:
#   min_train_rows: 1
#   min_val_rows: 1
#   drop_val_unseen_classes: true
#   experiment_name: null
#   notes: null
#   export_predictions: val   # val | all | none — predictions.parquet next to metrics

# Optional personal trades (see data/journal/README.md, configs/examples/journal_trades.example.csv)
# journal:
#   csv_path: data/journal/my_trades.csv

# Entry-time feature groups (Phase B). All default true if omitted.
features:
  log_entry_close: true
  label_geometry: true
  intraday_range_pct: true
  log1p_volume: true

paths:
  cache_dir: data/cache
  artifacts_dir: artifacts
