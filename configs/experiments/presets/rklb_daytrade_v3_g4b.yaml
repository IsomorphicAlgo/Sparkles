# G4b overlay: v3 + G4a + day-of-week cyclical embeddings
# A/B vs rklb_daytrade_v3_g4a.yaml — same model knobs, session_day_of_week on.
#
#   python scripts/run_trials.py --base configs/experiments/rklb_daytrade_v3.yaml \
#     --preset configs/experiments/presets/rklb_daytrade_v3_g4b.yaml

train:
  experiment_name: rklb_daytrade_v3_g4b
  notes: "v3 + G4a technical indicators + G4b sin_dow/cos_dow weekday seasonality"
  export_predictions: val

features:
  technical_indicators: true
  ema_windows_bars: [9, 21, 50]
  rsi_window_bars: 14
  macd_fast_bars: 12
  macd_slow_bars: 26
  macd_signal_bars: 9
  session_day_of_week: true
