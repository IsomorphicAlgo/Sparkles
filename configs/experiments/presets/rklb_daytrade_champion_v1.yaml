# Champion overlay: day-trade v2 + G1 + G2 + G3 (merge onto rklb_daytrade_v2.yaml)
# Reference run: Trial_RB_G1_G2_G3_v1 — artifacts/RKLB/20260621T161419_221266Z/
#   val_f1_macro 0.525 | take_profit recall 23% | best balanced TP F1 among full G1+G2+G3 trials
#
# Prerequisites (same as rklb_daytrade_g1_g2_g3_v1):
#   sparkles label -c configs/experiments/rklb_daytrade_v2.yaml
#   sparkles ingest -c configs/experiments/rklb_daytrade_v2.yaml -s SPY -i 1min
#   sparkles ingest -c configs/experiments/rklb_daytrade_v2.yaml -s VIXY -i 1day
#
# Train:
#   python scripts/run_trials.py --base configs/experiments/rklb_daytrade_v2.yaml \
#     --preset configs/experiments/presets/rklb_daytrade_champion_v1.yaml

train:
  experiment_name: rklb_daytrade_champion_v1
  notes: "Champion v1 — G1+G2+G3, depth 3, lr 0.08, n_estimators 127 (Trial_RB_G1_G2_G3_v1)"
  export_predictions: val

model:
  type: xgboost_classifier
  random_seed: 42
  class_weight: balanced
  xgb_max_depth: 3
  xgb_n_estimators: 127
  xgb_learning_rate: 0.08
  xgb_subsample: 0.8
  xgb_colsample_bytree: 0.8

preprocess:
  scaler: none

features:
  returns_multi_horizon: true
  returns_horizons_bars: [1, 5, 10, 15, 30, 60]
  realized_vol_multi: true
  realized_vol_windows_bars: [5, 10, 15, 30]
  realized_vol_include_ratio: true
  range_vol_multi: true
  range_vol_window_bars: 10
  range_vol_include_atr_norm: true
  session_time: true
  volume_context: true
  volume_median_window_bars: 60
  vwap_distance: true
  bar_microstructure: true
  market_context: true
  market_spy_return_bars: 15
