# Small re-tune grid after adding G4+ features on rklb_daytrade_v3.yaml.
# Narrow ranges around v3 grid-best (val_f1_macro 0.5624, run 20260623T032329_428232Z).
#
#   python scripts/run_grid_search.py --dry-run --grid configs/experiments/grids/rklb_daytrade_xgb_v3_refit.yaml
#   python scripts/run_grid_search.py --grid configs/experiments/grids/rklb_daytrade_xgb_v3_refit.yaml
#
# Grid mechanics:
#   - Each key is a dotted path into the merged experiment YAML (same as notebook GRID_SPEC).
#   - Values are lists; the runner takes the cartesian product of all `params` keys.
#   - Booleans work: e.g. features.range_vol_multi: [true, false] → two combos.
#   - Lists (horizons, ema windows) are single grid values: [[9, 21], [9, 21, 50]].
#   - Combo count = product of list lengths — uncomment sparingly.
#   - `fixed` applies to every combo (does not multiply count).
#
# Feature notes:
#   - market_context: true needs SPY/VIXY ingested for the experiment date range.
#   - train.sample_weight_method: uniqueness failed in the large v1 grid (label/OHLCV join); test before big sweeps.
#   - At least one features.* group must stay true (schema validator).

grid_name: rklb_daytrade_xgb_v3_refit

base: configs/experiments/rklb_daytrade_v3.yaml

# Optional overlay (G4a/G4b/G4c presets). Uncomment to merge before params:
# preset: configs/experiments/presets/rklb_daytrade_v3_g4c.yaml

experiment_name_prefix: grid_v3_refit
notes_prefix: "v3 refit after feature expansion"

fixed:
  train.export_predictions: none
  train.sample_weight_method: none

params:
  # --- Active refit (current) ---
  model.xgb_n_estimators: [ 127, 255]
  model.xgb_learning_rate: [0.015]
  model.xgb_max_depth: [4, 5, 6, 7]
  model.xgb_subsample: [0.6, 0.7, 0.8]
  model.xgb_colsample_bytree: [0.6, 0.7]
  # features.market_spy_return_bars: [15, 30]

